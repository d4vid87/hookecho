[package]
edition = "2021"
rust-version = "1.75.0"
name = "nexrad-data"
version = "1.0.0-rc.7"
authors = ["Daniel Way <contact@danieldway.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Data access for NEXRAD weather radar files and AWS integration."
readme = "README.md"
keywords = [
    "nexrad",
    "radar",
    "weather",
    "meteorology",
    "noaa",
]
categories = [
    "science",
    "parsing",
    "data-structures",
]
license = "MIT"
repository = "https://github.com/danielway/nexrad"

[features]
# hookecho patch: rustls + webpki-roots added so the AWS client can preconfigure webpki-roots TLS
# (see src/aws/client.rs) instead of reqwest 0.13's Android-hostile platform verifier.
aws = [
    "reqwest",
    "xml",
    "once_cell",
    "dep:rustls",
    "dep:webpki-roots",
]
aws-polling = [
    "aws",
    "tokio",
    "futures",
]
default = [
    "aws",
    "nexrad-model",
]
parallel = ["rayon"]

[lib]
name = "nexrad_data"
path = "src/lib.rs"

[[example]]
name = "chunk_iterator"
path = "examples/chunk_iterator.rs"
required-features = ["aws"]

[[example]]
name = "realtime"
path = "examples/realtime.rs"
required-features = ["aws-polling"]

[[example]]
name = "trim_fixture"
path = "examples/trim_fixture.rs"

[[test]]
name = "aws_archive"
path = "tests/aws_archive.rs"

[[test]]
name = "aws_realtime_network"
path = "tests/aws_realtime_network.rs"

[[test]]
name = "aws_realtime_polling"
path = "tests/aws_realtime_polling.rs"

[[test]]
name = "aws_realtime_types"
path = "tests/aws_realtime_types.rs"

[[test]]
name = "error_handling"
path = "tests/error_handling.rs"

[[test]]
name = "fixture_integration"
path = "tests/fixture_integration.rs"

[[test]]
name = "live_decode"
path = "tests/live_decode.rs"

[[test]]
name = "malformed_records"
path = "tests/malformed_records.rs"

[[test]]
name = "volume_header"
path = "tests/volume_header.rs"

[[test]]
name = "volume_records"
path = "tests/volume_records.rs"

[[test]]
name = "volume_scan"
path = "tests/volume_scan.rs"

[[bench]]
name = "scan"
path = "benches/scan.rs"
harness = false
required-features = ["nexrad-model"]

[dependencies.bzip2]
version = "0.6.0"

[dependencies.chrono]
version = "0.4.42"

[dependencies.flate2]
version = "1.1.1"

[dependencies.futures]
version = "0.3.31"
optional = true

[dependencies.log]
version = "0.4.28"

[dependencies.nexrad-decode]
version = "1.0.0-rc.3"

[dependencies.nexrad-model]
version = "1.0.0-rc.2"
optional = true

[dependencies.once_cell]
version = "1.21.0"
optional = true

[dependencies.rayon]
version = "1.11.0"
optional = true

[dependencies.reqwest]
version = "0.13.1"
features = ["rustls"]
optional = true
default-features = false

# hookecho patch: preconfigured webpki TLS for the AWS client (see src/aws/client.rs).
[dependencies.rustls]
version = "0.23"
default-features = false
features = ["aws-lc-rs"]
optional = true

[dependencies.webpki-roots]
version = "1"
optional = true

[dependencies.thiserror]
version = "2.0.16"

[dependencies.xml]
version = "1.0.0"
optional = true

[dependencies.zerocopy]
version = "0.8.30"
features = ["derive"]

[dev-dependencies.clap]
version = "4.5.48"
features = ["derive"]

[dev-dependencies.env_logger]
version = "0.11.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies.tokio]
version = "1.47.1"
features = ["full"]
optional = true

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies.criterion]
