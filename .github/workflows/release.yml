name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# softprops/action-gh-release needs write access; the default GITHUB_TOKEN is read-only.
permissions:
  contents: write

jobs:
  appimage:
    name: Linux AppImage
    # 22.04 sets the glibc floor (2.35); an AppImage built on newer won't run on older distros.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Same build deps as CI; plus FUSE isn't needed (the script uses extract-and-run).
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libxkbcommon-dev \
            libwayland-dev libxcb1-dev libgtk-3-dev

      - name: Build AppImage
        run: bash packaging/build-appimage.sh

      - name: Smoke-test the AppImage
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 ./dist/Hook_Echo-WX-x86_64.AppImage \
            --headless-icon /tmp/icon.png
          test -s /tmp/icon.png

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hook_Echo-WX-x86_64.AppImage
          path: dist/Hook_Echo-WX-x86_64.AppImage

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Hook_Echo-WX-x86_64.AppImage

  windows:
    name: Windows zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p hookecho

      - name: Smoke-test
        shell: bash
        run: |
          ./target/release/hookecho.exe --headless-icon icon.png
          test -s icon.png

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/hookecho.exe dist/
          cd dist && 7z a hookecho-windows-x86_64.zip hookecho.exe

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)" >> "$GITHUB_OUTPUT"

      # WiX 3 (candle/light) is preinstalled on windows-latest.
      - name: Build MSI
        shell: bash
        run: |
          candle -nologo -arch x64 \
            -dAppVersion=${{ steps.ver.outputs.version }} \
            -dExePath=target/release/hookecho.exe \
            -o dist/hookecho.wixobj packaging/windows/main.wxs
          light -nologo -o dist/Hook_Echo-WX-x86_64.msi dist/hookecho.wixobj

      # Inno Setup 6 is preinstalled on windows-latest (not on PATH). pwsh avoids
      # Git-bash mangling of the /D switches.
      - name: Build setup EXE
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.ver.outputs.version }} `
            /DExeDir=${{ github.workspace }}\target\release `
            /Odist packaging\windows\hookecho.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hookecho-windows-x86_64
          path: |
            dist/hookecho-windows-x86_64.zip
            dist/Hook_Echo-WX-x86_64.msi
            dist/Hook_Echo-WX-setup-x86_64.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hookecho-windows-x86_64.zip
            dist/Hook_Echo-WX-x86_64.msi
            dist/Hook_Echo-WX-setup-x86_64.exe

  android:
    name: Android APK (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (+ android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # Build the Rust cdylib into the Gradle jniLibs dir, then package the APK. Debug-signed so it
      # sideloads without a keystore; Play Store signing is deferred (see android/README.md).
      - name: Build libhookecho.so
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -o android/app/src/main/jniLibs build --release --lib -p hookecho

      # Stable signature across runs (phones reject updates whose signature changes). Absent
      # secrets (e.g. forks) fall back to a per-run debug key — still installable, not updatable.
      - name: Materialize signing keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/hookecho.p12"
            echo "HOOKECHO_KEYSTORE=$RUNNER_TEMP/hookecho.p12" >> "$GITHUB_ENV"
          fi

      - name: Assemble APK
        working-directory: android
        env:
          HOOKECHO_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Hook_Echo-WX-arm64-v8a.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hook_Echo-WX-arm64-v8a.apk
          path: Hook_Echo-WX-arm64-v8a.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Hook_Echo-WX-arm64-v8a.apk
