name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # eframe/rodio need ALSA + windowing dev headers on Linux; Windows uses native backends.
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libxkbcommon-dev \
            libwayland-dev libxcb1-dev libgtk-3-dev

      # Hard gates: the tree builds warning-free and the offline unit tests pass on both OSes.
      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      # Advisory: clippy lints are surfaced but don't fail the build (the tree is tuned for a
      # custom hand-format, and some pedantic lints are intentionally left).
      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets
