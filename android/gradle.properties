org.gradle.jvmargs=-Xmx2048m
# No androidx dependencies exist (hasCode=false), but AGP 8 treats false as legacy — true is the
# required/safe value and changes nothing for a dependency-free build.
android.useAndroidX=true
# NativeActivity app: no Java/Kotlin, so no R8/desugaring needed.
android.nonTransitiveRClass=true
